mutation CreateTank($tankName: String!, $capacity: Float!, $level: Float!, $stationId: UUID!) @auth(level: USER) {
  tank_insert(data: {
    tankName: $tankName,
    capacityLiters: $capacity,
    currentLevel: $level,
    stationId: $stationId
  })
}

mutation UpdateTankLevel($id: UUID!, $level: Float!) @auth(level: USER) {
  tank_update(id: $id, data: {
    currentLevel: $level
  })
}

mutation DeleteTank($id: UUID!) @auth(level: USER) {
  tank_delete(id: $id)
}

query ListTanksByStation($stationId: UUID!) @auth(level: USER) {
  tanks(where: {stationId: {eq: $stationId}}) {
    id
    tankName
    currentLevel
    capacityLiters
  }
}